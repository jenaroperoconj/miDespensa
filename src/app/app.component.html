<ion-app>
  <!-- Contenedor principal para las rutas -->
  <ion-router-outlet id="main-content"></ion-router-outlet>

  <!-- Menú lateral (Ion Menu) -->
  <ion-menu contentId="main-content" side="start" menuId="main-menu">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item (click)="navigateAndClose('/home')">
          <ion-icon slot="start" name="home-outline"></ion-icon>
          <ion-label>Home</ion-label>
        </ion-item>

        <ion-item (click)="navigateAndClose('/products')">
          <ion-icon slot="start" name="information-circle-outline"></ion-icon>
          <ion-label>Productos</ion-label>
        </ion-item>
        
      </ion-list>
    </ion-content>

    <ion-footer>
      <ion-button expand="full" color="medium" fill="solid" (click)="logout()">
        <ion-icon slot="start" name="log-out-outline"></ion-icon>
        Logout
      </ion-button>
    </ion-footer>
  </ion-menu>
</ion-app>
