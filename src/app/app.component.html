<ion-app>
  <!-- Contenedor principal para las rutas -->
  <ion-router-outlet id="main-content"></ion-router-outlet>

  <!-- Menú lateral (Ion Menu) -->
  <ion-menu contentId="main-content" side="start" menuId="main-menu">
    <ion-header>
      <ion-toolbar>
        <ion-title>Menú</ion-title>
      </ion-toolbar>
    </ion-header>

    <ion-content>
      <ion-list>
        <ion-item (click)="navigateAndClose('/home')">
          <ion-icon slot="start" name="home-outline"></ion-icon>
          <ion-label>Home</ion-label>
        </ion-item>

        <ion-item (click)="navigateAndClose('/products')">
          <ion-icon slot="start" name="grid-outline"></ion-icon>
          <ion-label>Mis Productos</ion-label>
        </ion-item>

        <ion-item (click)="navigateAndClose('/add-product')">
          <ion-icon slot="start" name="add-circle-outline"></ion-icon>
          <ion-label>Agregar un Producto</ion-label>
        </ion-item>

        <ion-item (click)="navigateAndClose('/share-my-despense')">
          <ion-icon slot="start" name="people-outline"></ion-icon>
          <ion-label>Compartir mi Despensa</ion-label>
        </ion-item>
      </ion-list>
    </ion-content>

    <ion-footer>
      <ion-button expand="full" color="medium" fill="solid" (click)="logout()">
        <ion-icon slot="start" name="log-out-outline"></ion-icon>
        Cerrar Sesión
      </ion-button>
    </ion-footer>
  </ion-menu>

  <!-- Botón Flotante -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="center" style="margin-bottom: 20px;">
    <ion-fab-button>
      <ion-icon name="qr-code"></ion-icon>
    </ion-fab-button>
  </ion-fab>

  <!-- Estructura de Ion-Tabs -->
  <ion-tabs>
    <ion-tab-bar slot="bottom">
      <ion-tab-button tab="home" href="/home/home">
        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="book" href="/home/book">
        <ion-icon name="book-outline"></ion-icon>
        <ion-label>Mis Productos</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="cart" href="/home/cart">
        <ion-icon name="cart-outline"></ion-icon>
        <ion-label>Carrito</ion-label>
      </ion-tab-button>
      <ion-tab-button tab="despense" href="/home/despense">
        <ion-icon name="person-sharp"></ion-icon>
        <ion-label>Mi cuenta</ion-label>
      </ion-tab-button>
    </ion-tab-bar>
  </ion-tabs>
</ion-app>
