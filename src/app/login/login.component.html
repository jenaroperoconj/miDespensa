<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>


<ion-content class="ion-padding">
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input formControlName="email" type="email" placeholder="Enter your email"></ion-input>
    </ion-item>


    <ion-item>
      <ion-label position="floating">Password</ion-label>
      <ion-input formControlName="password" type="password" placeholder="Enter your password"></ion-input>
    </ion-item>


    <ion-button expand="full" type="submit" [disabled]="loginForm.invalid">Login</ion-button>


    <div *ngIf="loginError" class="error-message">
      {{ loginError }}
    </div>
  </form>
</ion-content>
